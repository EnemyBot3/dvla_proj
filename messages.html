<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SwapTest — Messages</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .inbox { display: flex; flex-direction: column; gap: 0.5rem; }
    .convo-row {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 1rem 1.25rem;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
      text-decoration: none; color: inherit;
    }
    .convo-row:hover { border-color: var(--amber); background: var(--surface2); }
    .convo-left { display: flex; flex-direction: column; gap: 0.25rem; }
    .convo-name { font-weight: 600; font-size: 0.95rem; }
    .convo-preview { font-size: 0.82rem; color: var(--muted); }
    .convo-right { text-align: right; }
    .convo-date { font-size: 0.75rem; color: var(--muted); }
    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--muted); }
    .empty-state h3 { margin-bottom: 0.5rem; color: var(--text); }
  </style>
</head>
<body>

<nav>
  <span class="nav-logo">SWAPTEST</span>
  <div class="nav-links">
    <a href="calendar.html">Calendar</a>
    <a href="messages.html" class="active">Messages</a>
    <a href="#" class="logout" onclick="logout()">Logout</a>
  </div>
</nav>

<div class="page">
  <h2 style="margin-bottom:0.25rem">Messages</h2>
  <p class="muted" style="margin-bottom:1.5rem">Your swap conversations</p>

  <div class="inbox" id="inbox">
    <p class="muted">Loading...</p>
  </div>

  <p class="log" id="log"></p>
</div>

<script>
  const user = JSON.parse(localStorage.getItem('user'));
  if (!user) window.location = 'index.html';

  function log(msg) { document.getElementById('log').innerText += msg + '\n'; }
  function logout() { localStorage.removeItem('user'); window.location = 'index.html'; }

  function timeAgo(dateStr) {
    const diff = Date.now() - new Date(dateStr).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1)   return 'just now';
    if (mins < 60)  return mins + 'm ago';
    const hrs = Math.floor(mins / 60);
    if (hrs < 24)   return hrs + 'h ago';
    return Math.floor(hrs / 24) + 'd ago';
  }

  async function loadConversations() {
    log('loading conversations...');
    const res  = await fetch('/api/conversations?email=' + encodeURIComponent(user.email));
    const data = await res.json();
    log('got ' + data.conversations.length + ' conversations');

    const inbox = document.getElementById('inbox');
    inbox.innerHTML = '';

    if (data.conversations.length === 0) {
      inbox.innerHTML = `
        <div class="empty-state">
          <h3>No messages yet</h3>
          <p>Go to the calendar and click on someone's test date to start a swap conversation.</p>
        </div>`;
      return;
    }

    data.conversations.forEach(c => {
      const a = document.createElement('a');
      a.className = 'convo-row';
      a.href = 'chat.html?with=' + encodeURIComponent(c.otherEmail);
      a.innerHTML = `
        <div class="convo-left">
          <span class="convo-name">${c.otherName || c.otherEmail}</span>
          <span class="convo-preview">${c.lastMessage}</span>
        </div>
        <div class="convo-right">
          <div class="convo-date">${timeAgo(c.lastAt)}</div>
          ${c.otherTestDate ? `<div style="margin-top:4px"><span class="badge badge-blue">Test: ${c.otherTestDate}</span></div>` : ''}
        </div>`;
      inbox.appendChild(a);
    });
  }

  loadConversations();
</script>
</body>
</html>
