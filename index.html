<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THE BUTTON</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: blue;
      --fg: #f0ece0;
      --accent: #ff3c00;
      --dim: #333;
      --glow: rgba(255, 60, 0, 0.25);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: crosshair;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 10;
    }

    .label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      color: var(--dim);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .counter {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(6rem, 20vw, 14rem);
      line-height: 1;
      color: var(--fg);
      letter-spacing: -0.02em;
      transition: color 0.1s, transform 0.1s;
      user-select: none;
      min-width: 4ch;
      text-align: center;
    }

    .counter.bump {
      color: var(--accent);
      transform: scale(1.04);
    }

    .divider {
      width: 100%;
      max-width: 400px;
      height: 1px;
      background: var(--dim);
      margin: 2rem 0;
    }

    .btn {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 0.12em;
      background: transparent;
      color: var(--fg);
      border: 2px solid var(--fg);
      padding: 1rem 3.5rem;
      cursor: crosshair;
      position: relative;
      transition: all 0.08s;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 4px -4px -4px 4px;
      border: 2px solid var(--dim);
      transition: all 0.08s;
      pointer-events: none;
    }

    .btn:hover {
      background: var(--fg);
      color: var(--bg);
      box-shadow: 0 0 40px var(--glow);
    }

    .btn:active, .btn.pressed {
      transform: translate(4px, -4px);
      box-shadow: none;
    }

    .btn:active::after, .btn.pressed::after {
      inset: 0;
    }

    .status {
      margin-top: 2rem;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      color: var(--dim);
      text-transform: uppercase;
      height: 1em;
    }

    .status.live { color: var(--accent); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .counter, .btn { animation: fadeIn 0.4s ease both; }
    .btn { animation-delay: 0.1s; }
  </style>
</head>
<body>

  <div class="label">total presses — all time</div>
  <div class="counter" id="counter">—</div>
  <div class="divider"></div>
  <button class="btn" id="btn" onclick="press()">PRESS</button>
  <div class="status" id="status">connecting...</div>

  <script>
    const counterEl = document.getElementById('counter');
    const statusEl  = document.getElementById('status');
    const btn       = document.getElementById('btn');

    let count = null;

    async function fetchCount() {
      try {
        const res = await fetch('/api/counter');
        const data = await res.json();
        if (data.count !== count) {
          count = data.count;
          counterEl.textContent = count.toLocaleString();
          statusEl.textContent  = '● live';
          statusEl.className    = 'status live';
        }
      } catch {
        statusEl.textContent = 'connection error';
        statusEl.className   = 'status';
      }
    }

    async function press() {
      btn.classList.add('pressed');
      setTimeout(() => btn.classList.remove('pressed'), 120);

      // Optimistic update
      count = (count ?? 0) + 1;
      counterEl.textContent = count.toLocaleString();
      counterEl.classList.add('bump');
      setTimeout(() => counterEl.classList.remove('bump'), 150);

      try {
        const res  = await fetch('/api/counter', { method: 'POST' });
        const data = await res.json();
        count = data.count;
        counterEl.textContent = count.toLocaleString();
      } catch {
        statusEl.textContent = 'sync error';
      }
    }

    // Initial fetch then poll every 1.5s
    fetchCount();
    setInterval(fetchCount, 1500);
  </script>
</body>
</html>
