<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SwapTest — Chat</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .chat-layout { display: flex; flex-direction: column; height: calc(100vh - 56px); }
    .chat-header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0.9rem 1.5rem; display: flex; align-items: center; gap: 1rem;
    }
    .chat-header-info { flex: 1; }
    .chat-header h3 { margin-bottom: 0.1rem; }
    .messages-area { flex: 1; overflow-y: auto; padding: 1.25rem 1.5rem; display: flex; flex-direction: column; gap: 0.6rem; }
    .bubble-wrap { display: flex; }
    .bubble-wrap.mine { justify-content: flex-end; }
    .bubble {
      max-width: 65%; padding: 0.6rem 0.9rem; border-radius: 12px;
      font-size: 0.9rem; line-height: 1.5;
    }
    .bubble.theirs { background: var(--surface2); border-bottom-left-radius: 3px; }
    .bubble.mine   { background: var(--amber); color: #0d1b2a; border-bottom-right-radius: 3px; font-weight: 500; }
    .bubble-name   { font-size: 0.7rem; color: var(--muted); margin-bottom: 3px; }

    .chat-input-bar {
      border-top: 1px solid var(--border); background: var(--surface);
      padding: 0.85rem 1.25rem; display: flex; gap: 0.75rem; align-items: center;
    }
    .chat-input-bar input { flex: 1; margin: 0; }
  </style>
</head>
<body>

<nav>
  <span class="nav-logo">SWAPTEST</span>
  <div class="nav-links">
    <a href="calendar.html">Calendar</a>
    <a href="messages.html">Messages</a>
    <a href="#" class="logout" onclick="logout()">Logout</a>
  </div>
</nav>

<div class="chat-layout">
  <div class="chat-header">
    <a href="messages.html" class="btn btn-ghost" style="padding:0.4rem 0.8rem">&#8592;</a>
    <div class="chat-header-info">
      <h3 id="chat-with-name">...</h3>
      <p class="muted" id="chat-meta"></p>
    </div>
  </div>

  <div class="messages-area" id="messages-area"></div>

  <div class="chat-input-bar">
    <input id="msg-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter') send()"/>
    <button class="btn btn-primary" onclick="send()">Send</button>
  </div>
</div>

<p class="log" id="log" style="padding:0 1rem"></p>

<script>
  const user = JSON.parse(localStorage.getItem('user'));
  if (!user) window.location = 'index.html';

  const params    = new URLSearchParams(window.location.search);
  const withEmail = params.get('with');
  if (!withEmail) window.location = 'messages.html';

  document.getElementById('chat-with-name').innerText = withEmail;
  document.getElementById('chat-meta').innerText = 'Swap conversation with ' + withEmail;

  function log(msg) { document.getElementById('log').innerText += msg + '\n'; }
  function logout() { localStorage.removeItem('user'); window.location = 'index.html'; }

  let lastCount = 0;

  async function loadMessages() {
    const res  = await fetch(`/api/messages?from=${encodeURIComponent(user.email)}&to=${encodeURIComponent(withEmail)}`);
    const data = await res.json();

    if (data.messages.length === lastCount) return; // nothing new
    lastCount = data.messages.length;

    const area = document.getElementById('messages-area');
    area.innerHTML = '';

    data.messages.forEach(m => {
      const isMine = m.fromEmail === user.email;
      const wrap   = document.createElement('div');
      wrap.className = 'bubble-wrap' + (isMine ? ' mine' : '');

      const bubble = document.createElement('div');
      bubble.className = 'bubble ' + (isMine ? 'mine' : 'theirs');

      if (!isMine) {
        const name = document.createElement('div');
        name.className = 'bubble-name';
        name.innerText = m.fromEmail;
        bubble.appendChild(name);
      }

      const text = document.createElement('div');
      text.innerText = m.text;
      bubble.appendChild(text);
      wrap.appendChild(bubble);
      area.appendChild(wrap);
    });

    area.scrollTop = area.scrollHeight;
  }

  async function send() {
    const input = document.getElementById('msg-input');
    const text  = input.value.trim();
    if (!text) return;
    input.value = '';

    await fetch('/api/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fromEmail: user.email, toEmail: withEmail, text })
    });
    loadMessages();
  }

  // Also try to load the other user's name for the header
  async function loadOtherUser() {
    const res  = await fetch('/api/tests');
    const data = await res.json();
    const other = data.users.find(u => u.email === withEmail);
    if (other) {
      document.getElementById('chat-with-name').innerText = other.name;
      document.getElementById('chat-meta').innerText =
        'Their test: ' + (other.testDate || 'unknown') + ' · ' + (other.vehicleType || '') + ' · ' + (other.region || '');
    }
  }

  loadOtherUser();
  loadMessages();
  setInterval(loadMessages, 3000);
</script>
</body>
</html>
